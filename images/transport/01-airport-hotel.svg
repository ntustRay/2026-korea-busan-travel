<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">金海機場到 Hound Hotel Busan Station 路線圖</title>
  <desc id="desc">國際航廈步行至機場站，搭輕軌到沙上，轉地鐵二號線到西面，再轉一號線到釜山站六號出口。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker>
    <style>
      .title{font:700 32px Arial,'Noto Sans TC',sans-serif;fill:#0f172a}.sub{font:500 18px Arial,'Noto Sans TC',sans-serif;fill:#475569}.box{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:16}.label{font:700 21px Arial,'Noto Sans TC',sans-serif;fill:#0f172a}.small{font:500 16px Arial,'Noto Sans TC',sans-serif;fill:#475569}.arrow{stroke:#334155;stroke-width:4;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1200" height="520" fill="#f8fafc"/>
  <text x="60" y="55" class="title">金海機場 → 飯店｜全軌道交通</text>
  <text x="60" y="88" class="sub">約 70–90 分鐘｜2 次轉乘｜回程照相反方向搭乘</text>

  <rect x="45" y="150" width="170" height="120" class="box"/>
  <text x="130" y="192" text-anchor="middle" class="label">國際航廈</text>
  <text x="130" y="223" text-anchor="middle" class="small">국제선청사</text>
  <text x="130" y="250" text-anchor="middle" class="small">跟 Light Rail 指標</text>

  <path d="M215 210 H280" class="arrow"/>
  <text x="247" y="190" text-anchor="middle" class="small">步行</text>

  <rect x="285" y="150" width="170" height="120" class="box"/>
  <circle cx="320" cy="185" r="12" fill="#7e22ce"/>
  <text x="370" y="192" text-anchor="middle" class="label">機場站</text>
  <text x="370" y="223" text-anchor="middle" class="small">공항역</text>
  <text x="370" y="250" text-anchor="middle" class="small">往 사상</text>

  <path d="M455 210 H520" class="arrow"/>
  <text x="487" y="190" text-anchor="middle" class="small">輕軌</text>

  <rect x="525" y="150" width="170" height="120" class="box"/>
  <circle cx="560" cy="185" r="12" fill="#7e22ce"/>
  <circle cx="590" cy="185" r="12" fill="#16a34a"/>
  <text x="610" y="215" text-anchor="middle" class="label">沙上站</text>
  <text x="610" y="246" text-anchor="middle" class="small">사상역｜轉 Line 2</text>

  <path d="M695 210 H760" class="arrow"/>
  <text x="727" y="190" text-anchor="middle" class="small">往 장산</text>

  <rect x="765" y="150" width="170" height="120" class="box"/>
  <circle cx="800" cy="185" r="12" fill="#16a34a"/>
  <circle cx="830" cy="185" r="12" fill="#f97316"/>
  <text x="850" y="215" text-anchor="middle" class="label">西面站</text>
  <text x="850" y="246" text-anchor="middle" class="small">서면역｜轉 Line 1</text>

  <path d="M935 210 H1000" class="arrow"/>
  <text x="967" y="190" text-anchor="middle" class="small">往 다대포해수욕장</text>

  <rect x="1005" y="150" width="150" height="120" class="box"/>
  <circle cx="1040" cy="185" r="12" fill="#f97316"/>
  <text x="1080" y="215" text-anchor="middle" class="label">釜山站</text>
  <text x="1080" y="246" text-anchor="middle" class="small">부산역</text>

  <path d="M1080 270 V330" class="arrow"/>
  <rect x="880" y="340" width="275" height="105" class="box"/>
  <text x="1017" y="382" text-anchor="middle" class="label">6 號出口 → 飯店</text>
  <text x="1017" y="414" text-anchor="middle" class="small">부산역 6번 출구｜步行約 5 分鐘</text>

  <rect x="55" y="330" width="730" height="115" fill="#fff7ed" stroke="#fdba74" stroke-width="2" rx="16"/>
  <text x="80" y="370" class="label">回機場不要搭反</text>
  <text x="80" y="403" class="small">釜山站 Line 1 往 노포 → 西面 Line 2 往 양산 → 沙上輕軌往 가야대 → 공항역</text>
</svg>