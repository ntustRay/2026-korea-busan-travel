<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" role="img" aria-labelledby="title desc">
  <title id="title">教大站轉乘東海線示意圖</title>
  <desc id="desc">從釜山地鐵一號線教大站依東海線標示走連通道，轉乘往太和江或日光方向的東海線列車。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0 L0 6 L9 3 z" fill="#334155"/></marker>
    <style>.title{font:700 32px Arial,'Noto Sans TC',sans-serif;fill:#0f172a}.sub{font:500 18px Arial,'Noto Sans TC',sans-serif;fill:#475569}.box{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:16}.label{font:700 22px Arial,'Noto Sans TC',sans-serif;fill:#0f172a}.small{font:500 17px Arial,'Noto Sans TC',sans-serif;fill:#475569}.arrow{stroke:#334155;stroke-width:4;fill:none;marker-end:url(#arrow)}</style>
  </defs>
  <rect width="1200" height="500" fill="#f8fafc"/>
  <text x="60" y="58" class="title">Luge 日關鍵轉乘｜教大站 교대역</text>
  <text x="60" y="92" class="sub">推薦在教大轉東海線：站內有連通道，比釜田地面步行轉乘更無腦</text>

  <rect x="65" y="155" width="240" height="145" class="box"/>
  <circle cx="110" cy="198" r="15" fill="#f97316"/>
  <text x="185" y="205" text-anchor="middle" class="label">Line 1 教大站</text>
  <text x="185" y="240" text-anchor="middle" class="small">교대역</text>
  <text x="185" y="273" text-anchor="middle" class="small">下車後不要直接出站</text>

  <path d="M305 228 H445" class="arrow"/>
  <text x="375" y="202" text-anchor="middle" class="small">跟著藍色標示</text>

  <rect x="450" y="135" width="310" height="185" fill="#eff6ff" stroke="#60a5fa" stroke-width="2" rx="18"/>
  <text x="605" y="183" text-anchor="middle" class="label">尋找這些字</text>
  <text x="605" y="225" text-anchor="middle" style="font:700 28px Arial,'Noto Sans KR',sans-serif;fill:#1d4ed8">동해선 · Donghae Line</text>
  <text x="605" y="265" text-anchor="middle" class="small">沿連通道前往東海線月台</text>
  <text x="605" y="295" text-anchor="middle" class="small">交通卡依閘門指示感應</text>

  <path d="M760 228 H900" class="arrow"/>
  <text x="830" y="202" text-anchor="middle" class="small">確認列車停靠 오시리아</text>

  <rect x="905" y="155" width="230" height="145" class="box"/>
  <circle cx="950" cy="198" r="15" fill="#2563eb"/>
  <text x="1030" y="205" text-anchor="middle" class="label">東海線月台</text>
  <text x="1020" y="240" text-anchor="middle" class="small">往 태화강／일광</text>
  <text x="1020" y="273" text-anchor="middle" class="small">下一目標：오시리아역</text>

  <rect x="65" y="365" width="1070" height="80" fill="#fff7ed" stroke="#fdba74" stroke-width="2" rx="14"/>
  <text x="600" y="414" text-anchor="middle" class="label">重點：看到「동해선」才走；不要只看到「교대」或「부전」就以為已在同一個月台。</text>
</svg>