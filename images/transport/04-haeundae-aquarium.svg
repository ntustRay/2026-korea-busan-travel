<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" role="img" aria-labelledby="title desc">
  <title id="title">海雲台站到 SEA LIFE 水族館步行示意圖</title>
  <desc id="desc">從海雲台站三號或五號出口，依海雲台海水浴場標示直走約十分鐘到海邊與 SEA LIFE Busan Aquarium。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0 L0 6 L9 3 z" fill="#334155"/></marker>
    <style>.title{font:700 32px Arial,'Noto Sans TC',sans-serif;fill:#0f172a}.sub{font:500 18px Arial,'Noto Sans TC',sans-serif;fill:#475569}.box{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:18}.label{font:700 22px Arial,'Noto Sans TC',sans-serif;fill:#0f172a}.small{font:500 17px Arial,'Noto Sans TC',sans-serif;fill:#475569}.arrow{stroke:#334155;stroke-width:4;fill:none;marker-end:url(#arrow)}</style>
  </defs>
  <rect width="1200" height="500" fill="#f8fafc"/>
  <text x="60" y="58" class="title">海雲台站 → SEA LIFE → 海邊</text>
  <text x="60" y="92" class="sub">官方建議由 3 或 5 號出口步行約 10 分鐘；只要一路看「해운대해수욕장」即可</text>

  <rect x="65" y="165" width="250" height="150" class="box"/>
  <circle cx="115" cy="208" r="15" fill="#16a34a"/>
  <text x="200" y="214" text-anchor="middle" class="label">海雲台站</text>
  <text x="190" y="250" text-anchor="middle" class="small">해운대역</text>
  <text x="190" y="282" text-anchor="middle" class="small">3번 / 5번 출구</text>

  <path d="M315 240 H650" class="arrow"/>
  <text x="482" y="205" text-anchor="middle" class="label">直走往海邊</text>
  <text x="482" y="272" text-anchor="middle" class="small">約 10 分鐘｜經海雲台大街</text>
  <text x="482" y="300" text-anchor="middle" class="small">沿途看到 해운대해수욕장 指標就對了</text>

  <rect x="655" y="145" width="260" height="185" fill="#ecfeff" stroke="#22d3ee" stroke-width="2" rx="18"/>
  <text x="785" y="192" text-anchor="middle" class="label">SEA LIFE Busan</text>
  <text x="785" y="230" text-anchor="middle" class="small">씨라이프 부산 아쿠아리움</text>
  <text x="785" y="264" text-anchor="middle" class="small">해운대해변로 266</text>
  <text x="785" y="297" text-anchor="middle" class="small">入口就在海灘旁</text>

  <path d="M915 240 H1035" class="arrow"/>
  <rect x="1040" y="155" width="120" height="165" fill="#dbeafe" stroke="#60a5fa" stroke-width="2" rx="18"/>
  <path d="M1055 220 Q1080 195 1105 220 T1150 220" fill="none" stroke="#2563eb" stroke-width="5"/>
  <text x="1100" y="263" text-anchor="middle" class="label">海邊</text>
  <text x="1100" y="295" text-anchor="middle" class="small">해운대해수욕장</text>

  <rect x="65" y="375" width="1095" height="72" fill="#fff7ed" stroke="#fdba74" stroke-width="2" rx="14"/>
  <text x="612" y="419" text-anchor="middle" class="label">不要另外搭車：水族館離場後直接看海，再原路走回 해운대역 前往 SPA LAND。</text>
</svg>